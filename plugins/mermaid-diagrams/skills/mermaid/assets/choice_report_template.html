<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mermaid Choice Report</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --ink: #050505;
      --muted: #696969;
      --line: #050505;
      --approved: #177245;
      --rejected: #b3261e;
      --pending: #8a6f00;
      --panel: #ffffff;
      --focus: #0096d6;
      --soft: #efefeb;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      color: var(--ink);
      background: var(--panel);
      border: 4px solid var(--line);
      border-radius: 0;
      cursor: pointer;
    }

    button:focus-visible,
    textarea:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 3px;
    }

    .shell {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: stretch;
      margin: -16px -16px 0;
      padding: 16px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px;
    }

    .submit-button {
      min-width: 180px;
      min-height: 52px;
      padding: 8px 22px;
      font-size: 1.75rem;
      text-transform: uppercase;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(110px, 1fr));
      gap: 10px;
    }

    .stat {
      min-height: 52px;
      display: grid;
      place-items: center;
      padding: 6px 10px;
      border: 4px solid var(--line);
      background: var(--panel);
      text-align: center;
      line-height: 1.1;
    }

    .stat-value {
      display: block;
      font-size: 1.45rem;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    .block-stack {
      display: grid;
      gap: 18px;
    }

    .block-section {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto;
      height: calc(100vh - 122px);
      min-height: 0;
      gap: 10px;
      overflow: hidden;
      scroll-margin-top: 94px;
    }

    .block-section.is-active .panel,
    .block-section.is-active .decision-button,
    .block-section.is-active .note-input {
      box-shadow: 0 0 0 3px var(--focus);
    }

    .compare-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 0;
      gap: 24px;
      overflow: hidden;
    }

    .panel {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 0;
      background: var(--panel);
      border: 4px solid var(--line);
      overflow: hidden;
    }

    .panel-header {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 4px solid var(--line);
    }

    .panel-title {
      min-width: 0;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .option-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .option-tabs {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .option-tab,
    .control-button {
      min-height: 36px;
      max-width: 180px;
      padding: 4px 10px;
      overflow: hidden;
      border-width: 2px;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.9rem;
    }

    .option-tab[aria-selected="true"] {
      border-width: 4px;
    }

    .option-tab.approved {
      color: var(--approved);
    }

    .option-tab.rejected {
      color: var(--rejected);
    }

    .option-tab.pending {
      color: var(--pending);
    }

    .panel-body {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: auto;
    }

    .mermaid-panel .panel-body {
      overflow: hidden;
    }

    .source-text,
    .diagram-stage {
      width: 100%;
      min-height: 0;
      max-width: 100%;
      color: var(--ink);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .source-text {
      white-space: pre-wrap;
      font-size: 2.55rem;
      text-align: center;
    }

    .source-text.has-long-text {
      font-size: 1.1rem;
      text-align: left;
    }

    .diagram-stage {
      min-height: 0;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      contain: size layout paint;
    }

    .diagram-stage svg {
      display: block;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }

    .code-fallback {
      width: 100%;
      margin: 0;
      padding: 16px;
      overflow: auto;
      border: 2px solid var(--line);
      background: #fbfbfb;
      font-family: Menlo, Consolas, monospace;
      font-size: 0.92rem;
      line-height: 1.45;
      white-space: pre;
    }

    .panel-footer {
      min-height: 44px;
      padding: 8px 14px;
      border-top: 4px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .decision-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
    }

    .decision-button {
      min-height: 58px;
      font-size: 2.35rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .decision-button.reject.is-active {
      color: #ffffff;
      background: var(--rejected);
    }

    .decision-button.approve.is-active {
      color: #ffffff;
      background: var(--approved);
    }

    .note-input {
      width: 100%;
      height: 58px;
      min-height: 58px;
      resize: vertical;
      padding: 10px 14px;
      border: 4px solid var(--line);
      border-radius: 0;
      color: var(--ink);
      background: var(--panel);
      font-size: 1.55rem;
      line-height: 1.15;
    }

    .note-input::placeholder {
      color: var(--ink);
      opacity: 0.85;
    }

    .output-panel {
      display: grid;
      gap: 10px;
    }

    .output-panel[hidden] {
      display: none;
    }

    .output-text {
      width: 100%;
      min-height: 220px;
      padding: 14px;
      border: 4px solid var(--line);
      background: var(--panel);
      font-family: Menlo, Consolas, monospace;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .fullscreen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 16px;
      background: var(--bg);
    }

    .fullscreen[hidden] {
      display: none;
    }

    .fullscreen-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      width: 100%;
    }

    .fullscreen-title {
      flex: 1 1 0;
      min-width: 0;
      padding: 8px 12px;
      overflow: hidden;
      border: 4px solid var(--line);
      background: var(--panel);
      font-size: 1.35rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fullscreen-header .control-button {
      flex: 0 0 auto;
      max-width: none;
    }

    .fullscreen-stage {
      width: 100%;
      min-height: 0;
      min-width: 0;
      display: block;
      padding: 18px;
      overflow: hidden;
      border: 4px solid var(--line);
      background: var(--panel);
    }

    .fullscreen-stage svg {
      display: block;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
    }

    .fullscreen-stage .code-fallback {
      height: 100%;
      overflow: auto;
    }

    @media (max-width: 900px) {
      .shell {
        gap: 16px;
        padding: 10px;
      }

      .topbar,
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .submit-button {
        width: 100%;
        font-size: 1.5rem;
      }

      .compare-grid,
      .decision-row {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .panel {
        grid-template-rows: auto minmax(340px, 1fr) auto;
      }

      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .option-tools,
      .option-tabs {
        justify-content: flex-start;
      }

      .decision-button {
        min-height: 72px;
        font-size: 2rem;
      }

      .source-text {
        font-size: 1.55rem;
      }

      .source-text.has-long-text {
        font-size: 1rem;
      }

      .note-input {
        font-size: 1.35rem;
      }

      .panel-title {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <script id="choice-report-data" type="application/json">
{
  "title": "Mermaid choices",
  "blocks": [
    {
      "id": "block-1",
      "source": "Source text block",
      "note": "",
      "options": [
        {
          "id": "diagram-abc",
          "type": "flowchart",
          "label": "diagram ABC",
          "code": "flowchart TD\n    A[Source] --> B[Mermaid]\n    B --> C[Submit]",
          "lint": {
            "status": "passed"
          }
        }
      ]
    }
  ]
}
  </script>

  <main class="shell" aria-label="Mermaid choice report">
    <header class="topbar">
      <button class="submit-button" id="submitButton" type="button">Submit</button>
      <section class="stats-grid" aria-label="Review stats">
        <div class="stat"><span><span class="stat-value" id="approvedStat">0</span><span class="stat-label">Approved</span></span></div>
        <div class="stat"><span><span class="stat-value" id="rejectedStat">0</span><span class="stat-label">Rejected</span></span></div>
        <div class="stat"><span><span class="stat-value" id="notesStat">0</span><span class="stat-label">Notes</span></span></div>
        <div class="stat"><span><span class="stat-value" id="totalStat">0</span><span class="stat-label">Blocks</span></span></div>
        <div class="stat"><span><span class="stat-value" id="currentStat">0 / 0</span><span class="stat-label">Current</span></span></div>
      </section>
    </header>

    <section class="block-stack" id="blockStack" aria-live="polite"></section>

    <section class="output-panel" id="outputPanel" hidden>
      <textarea class="output-text" id="outputText" readonly aria-label="Submitted decisions"></textarea>
    </section>
  </main>

  <section class="fullscreen" id="fullscreen" hidden aria-label="Fullscreen Mermaid preview" role="dialog" aria-modal="true">
    <header class="fullscreen-header">
      <div class="fullscreen-title" id="fullscreenTitle">Mermaid block</div>
      <button class="control-button" id="closeFullscreenButton" type="button">Close</button>
    </header>
    <div class="fullscreen-stage" id="fullscreenStage"></div>
  </section>

  <script type="module">
    const sampleData = {
      title: "Mermaid choices",
      blocks: [
        {
          id: "block-1",
          source: "Source text block",
          note: "",
          options: [
            {
              id: "diagram-abc",
              type: "flowchart",
              label: "diagram ABC",
              code: "flowchart TD\n    A[Source] --> B[Mermaid]\n    B --> C[Submit]",
              lint: { status: "passed" }
            }
          ]
        }
      ]
    };

    const refs = {
      submitButton: document.getElementById("submitButton"),
      approvedStat: document.getElementById("approvedStat"),
      rejectedStat: document.getElementById("rejectedStat"),
      notesStat: document.getElementById("notesStat"),
      totalStat: document.getElementById("totalStat"),
      currentStat: document.getElementById("currentStat"),
      blockStack: document.getElementById("blockStack"),
      outputPanel: document.getElementById("outputPanel"),
      outputText: document.getElementById("outputText"),
      fullscreen: document.getElementById("fullscreen"),
      fullscreenTitle: document.getElementById("fullscreenTitle"),
      fullscreenStage: document.getElementById("fullscreenStage"),
      closeFullscreenButton: document.getElementById("closeFullscreenButton")
    };

    const rawData = readData();
    const data = normalizeData(rawData);
    const state = {
      blockIndex: 0,
      optionIndexes: data.blocks.map(() => 0),
      renderToken: 0,
      fullscreen: null
    };

    let mermaidApi = null;

    boot();

    async function boot() {
      document.title = data.title || "Mermaid Choice Report";
      renderShell();
      bindEvents();
      updateAll();
      await loadMermaid();
      renderAllDiagrams();
    }

    function readData() {
      const element = document.getElementById("choice-report-data");
      if (!element) {
        return sampleData;
      }

      try {
        return JSON.parse(element.textContent);
      } catch (error) {
        console.error("Invalid choice-report-data JSON", error);
        return sampleData;
      }
    }

    function normalizeData(input) {
      const blocks = Array.isArray(input && input.blocks) ? input.blocks : sampleData.blocks;
      const normalizedBlocks = blocks.map((block, blockIndex) => {
        const options = Array.isArray(block.options) && block.options.length
          ? block.options
          : sampleData.blocks[0].options;

        return {
          id: String(block.id || `block-${blockIndex + 1}`),
          source: String(block.source || ""),
          note: String(block.note || ""),
          options: options.map((option, optionIndex) => ({
            id: String(option.id || `option-${optionIndex + 1}`),
            type: String(option.type || "mermaid"),
            label: String(option.label || option.title || option.type || `Option ${optionIndex + 1}`),
            code: String(option.code || ""),
            status: normalizeStatus(option.status),
            lint: option.lint || null
          }))
        };
      });

      return {
        title: String(input && input.title ? input.title : "Mermaid choices"),
        blocks: normalizedBlocks.length ? normalizedBlocks : sampleData.blocks
      };
    }

    function normalizeStatus(status) {
      return status === "approved" || status === "rejected" ? status : "pending";
    }

    function renderShell() {
      refs.blockStack.replaceChildren(
        ...data.blocks.map((block, blockIndex) => renderBlockSection(block, blockIndex))
      );
    }

    function renderBlockSection(block, blockIndex) {
      const section = document.createElement("section");
      section.className = "block-section";
      section.dataset.blockIndex = String(blockIndex);
      section.id = `block-${blockIndex + 1}`;

      section.innerHTML = `
        <section class="compare-grid">
          <article class="panel source-panel" aria-labelledby="source-title-${blockIndex}">
            <header class="panel-header">
              <div class="panel-title" id="source-title-${blockIndex}">Source text block</div>
            </header>
            <div class="panel-body">
              <div class="source-text"></div>
            </div>
            <footer class="panel-footer"></footer>
          </article>
          <article class="panel mermaid-panel" aria-labelledby="mermaid-title-${blockIndex}">
            <header class="panel-header">
              <div class="panel-title" id="mermaid-title-${blockIndex}">Mermaid block</div>
              <div class="option-tools">
                <div class="option-tabs" role="tablist" aria-label="Mermaid options"></div>
                <button class="control-button fullscreen-button" type="button">Full screen</button>
              </div>
            </header>
            <div class="panel-body">
              <div class="diagram-stage"></div>
            </div>
            <footer class="panel-footer"></footer>
          </article>
        </section>
        <section class="decision-row" aria-label="Decision controls">
          <button class="decision-button reject" type="button">Reject</button>
          <button class="decision-button approve" type="button">Approve</button>
        </section>
        <textarea
          class="note-input"
          placeholder="optional text input. for ex. use diagram ABC"
          aria-label="Optional text input"
        ></textarea>
      `;

      section.querySelector(".source-text").textContent = block.source;
      section.querySelector(".source-text").classList.toggle("has-long-text", block.source.length > 120);
      section.querySelector(".source-panel .panel-footer").textContent = block.id;
      section.querySelector(".note-input").value = block.note;

      section.addEventListener("click", () => setActiveBlock(blockIndex, false));
      section.querySelector(".reject").addEventListener("click", () => setDecision(blockIndex, "rejected"));
      section.querySelector(".approve").addEventListener("click", () => setDecision(blockIndex, "approved"));
      section.querySelector(".fullscreen-button").addEventListener("click", () => openFullscreen(blockIndex));
      section.querySelector(".note-input").addEventListener("input", (event) => {
        data.blocks[blockIndex].note = event.target.value;
        setActiveBlock(blockIndex, false);
        updateStats();
      });

      renderOptionTabs(section, block, blockIndex);
      return section;
    }

    function renderOptionTabs(section, block, blockIndex) {
      const tabs = section.querySelector(".option-tabs");
      tabs.replaceChildren();

      block.options.forEach((option, optionIndex) => {
        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = `option-tab ${option.status}`;
        tab.textContent = option.label;
        tab.title = `${option.type}: ${option.status}`;
        tab.setAttribute("role", "tab");
        tab.setAttribute("aria-selected", String(optionIndex === state.optionIndexes[blockIndex]));
        tab.addEventListener("click", (event) => {
          event.stopPropagation();
          state.optionIndexes[blockIndex] = optionIndex;
          setActiveBlock(blockIndex, false);
          updateBlock(blockIndex);
          renderDiagram(blockIndex);
        });
        tabs.append(tab);
      });
    }

    function bindEvents() {
      refs.submitButton.addEventListener("click", submitChoices);
      refs.closeFullscreenButton.addEventListener("click", closeFullscreen);
      refs.fullscreen.addEventListener("click", (event) => {
        if (event.target === refs.fullscreen) {
          closeFullscreen();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.defaultPrevented || isTextEditingTarget(event.target)) {
          return;
        }

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          setDecision(state.blockIndex, "rejected");
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          setDecision(state.blockIndex, "approved");
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          moveBlock(-1);
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          moveBlock(1);
        } else if (event.key === "Escape" && !refs.fullscreen.hidden) {
          event.preventDefault();
          closeFullscreen();
        }
      });
    }

    function isTextEditingTarget(target) {
      if (!(target instanceof HTMLElement)) {
        return false;
      }

      const tagName = target.tagName.toLowerCase();
      return tagName === "textarea" || tagName === "input" || target.isContentEditable;
    }

    async function loadMermaid() {
      try {
        const module = await import("https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs");
        mermaidApi = module.default;
        mermaidApi.initialize({
          startOnLoad: false,
          securityLevel: "strict",
          theme: "default"
        });
      } catch (error) {
        console.warn("Mermaid renderer unavailable, showing code fallback.", error);
        mermaidApi = null;
      }
    }

    function currentBlock() {
      return data.blocks[state.blockIndex];
    }

    function selectedOption(blockIndex) {
      const block = data.blocks[blockIndex];
      return block.options[state.optionIndexes[blockIndex] || 0];
    }

    function updateAll() {
      data.blocks.forEach((_, blockIndex) => updateBlock(blockIndex));
      updateStats();
    }

    function updateBlock(blockIndex) {
      const section = blockSection(blockIndex);
      const block = data.blocks[blockIndex];
      const option = selectedOption(blockIndex);
      section.classList.toggle("is-active", blockIndex === state.blockIndex);
      section.querySelector(".mermaid-panel .panel-footer").textContent = footerText(option);
      section.querySelector(".reject").classList.toggle("is-active", option.status === "rejected");
      section.querySelector(".approve").classList.toggle("is-active", option.status === "approved");
      section.querySelector(".reject").setAttribute("aria-pressed", String(option.status === "rejected"));
      section.querySelector(".approve").setAttribute("aria-pressed", String(option.status === "approved"));
      renderOptionTabs(section, block, blockIndex);
    }

    function updateStats() {
      const stats = reviewStats();
      refs.approvedStat.textContent = String(stats.approved);
      refs.rejectedStat.textContent = String(stats.rejected);
      refs.notesStat.textContent = String(stats.notes);
      refs.totalStat.textContent = String(data.blocks.length);
      refs.currentStat.textContent = `${state.blockIndex + 1} / ${data.blocks.length}`;
    }

    function reviewStats() {
      return data.blocks.reduce((stats, block) => {
        if (block.note.trim()) {
          stats.notes += 1;
        }
        for (const option of block.options) {
          if (option.status === "approved") {
            stats.approved += 1;
          } else if (option.status === "rejected") {
            stats.rejected += 1;
          }
        }
        return stats;
      }, { approved: 0, rejected: 0, notes: 0 });
    }

    async function renderAllDiagrams() {
      for (let blockIndex = 0; blockIndex < data.blocks.length; blockIndex += 1) {
        await renderDiagram(blockIndex);
      }
    }

    async function renderDiagram(blockIndex) {
      const token = ++state.renderToken;
      const option = selectedOption(blockIndex);
      const stage = blockSection(blockIndex).querySelector(".diagram-stage");
      await renderOptionInto(option, stage, `inline-${blockIndex}`, token);
    }

    async function renderOptionInto(option, stage, prefix, token = null) {
      stage.textContent = "";

      if (!option.code.trim()) {
        stage.textContent = "Mermaid block";
        return;
      }

      if (!mermaidApi) {
        renderCodeFallback(stage, option.code);
        return;
      }

      const renderId = `mermaid-choice-${prefix}-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      try {
        const result = await mermaidApi.render(renderId, option.code);
        if (token === null || token === state.renderToken) {
          stage.innerHTML = result.svg;
          normalizeRenderedSvg(stage);
        }
      } catch (error) {
        if (token === null || token === state.renderToken) {
          console.warn("Browser Mermaid render failed, showing code fallback.", error);
          renderCodeFallback(stage, option.code);
        }
      }
    }

    function normalizeRenderedSvg(stage) {
      const svg = stage.querySelector("svg");
      if (!svg) {
        return;
      }
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
    }

    function renderCodeFallback(stage, code) {
      const pre = document.createElement("pre");
      pre.className = "code-fallback";
      pre.textContent = code;
      stage.replaceChildren(pre);
    }

    function footerText(option) {
      const lint = option.lint && option.lint.status ? `lint: ${option.lint.status}` : "lint: not recorded";
      return `${option.type} | ${option.id} | ${lint}`;
    }

    function setDecision(blockIndex, status) {
      setActiveBlock(blockIndex, false);
      selectedOption(blockIndex).status = status;
      updateBlock(blockIndex);
      updateStats();
    }

    function moveBlock(delta) {
      const nextIndex = (state.blockIndex + delta + data.blocks.length) % data.blocks.length;
      setActiveBlock(nextIndex, true);
    }

    function setActiveBlock(blockIndex, shouldScroll) {
      state.blockIndex = blockIndex;
      data.blocks.forEach((_, index) => updateBlock(index));
      updateStats();
      if (shouldScroll) {
        blockSection(blockIndex).scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function openFullscreen(blockIndex) {
      setActiveBlock(blockIndex, false);
      const option = selectedOption(blockIndex);
      state.fullscreen = { blockIndex, optionIndex: state.optionIndexes[blockIndex] || 0 };
      refs.fullscreenTitle.textContent = `${option.label} | ${footerText(option)}`;
      refs.fullscreen.hidden = false;
      renderOptionInto(option, refs.fullscreenStage, `fullscreen-${blockIndex}`);
      refs.closeFullscreenButton.focus();
    }

    function closeFullscreen() {
      refs.fullscreen.hidden = true;
      refs.fullscreenStage.textContent = "";
      state.fullscreen = null;
    }

    function submitChoices() {
      const payload = {
        title: data.title,
        submittedAt: new Date().toISOString(),
        stats: reviewStats(),
        blocks: data.blocks.map((block) => ({
          id: block.id,
          source: block.source,
          note: block.note,
          options: block.options.map((option) => ({
            id: option.id,
            type: option.type,
            label: option.label,
            code: option.code,
            lint: option.lint,
            status: submittedStatus(option, block)
          }))
        }))
      };

      const output = JSON.stringify(payload, null, 2);
      refs.outputText.value = output;
      refs.outputPanel.hidden = false;
      refs.submitButton.textContent = "Submitted";
      refs.outputPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      navigator.clipboard?.writeText(output).catch(() => {});
    }

    function submittedStatus(option, block) {
      if (option.status === "rejected") {
        return "REGECT";
      }
      if (option.status === "approved" || block.note.trim()) {
        return "APPROVE";
      }
      return "APPROVE";
    }

    function blockSection(blockIndex) {
      return refs.blockStack.querySelector(`[data-block-index="${blockIndex}"]`);
    }
  </script>
</body>
</html>
